title: Edition-X
description: A technical blog by Daniel Kelly — DevOps, platform engineering, cloud infrastructure, and the systems that power modern software.
author: Daniel Kelly
url: https://edition-x.github.io
baseurl: ""

# Analytics — set your GoatCounter account code after signing up at goatcounter.com
goatcounter: edition-x

markdown: kramdown
theme: null

plugins:
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
